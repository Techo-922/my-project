<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>зҷ»еҪ•жөӢиҜ•</title>
</head>
<body>
    <h2>з®ЎзҗҶе‘ҳзҷ»еҪ•жөӢиҜ•</h2>
    <form id="loginForm">
        <div>
            <label>з”ЁжҲ·еҗҚпјҡ</label>
            <input type="text" id="username" value="admin">
        </div>
        <div>
            <label>еҜҶз Ғпјҡ</label>
            <input type="password" id="password" value="admin">
        </div>
        <div>
            <button type="button" onclick="testLogin()">жөӢиҜ•зҷ»еҪ•</button>
        </div>
    </form>
    
    <div id="result"></div>
    
    <script>
        function testLogin() {
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            
            fetch(`/users/login?username=${username}&password=${password}`, {
                method: 'GET'
            })
            .then(response => response.json())
            .then(data => {
                document.getElementById('result').innerHTML = 
                    '<h3>зҷ»еҪ•з»“жһңпјҡ</h3><pre>' + JSON.stringify(data, null, 2) + '</pre>';
                
                if (data.code === 0) {
                    alert('зҷ»еҪ•жҲҗеҠҹпјҒToken: ' + data.token);
                } else {
                    alert('зҷ»еҪ•еӨұиҙҘпјҡ' + data.msg);
                }
            })
            .catch(error => {
                document.getElementById('result').innerHTML = 
                    '<h3>й”ҷиҜҜпјҡ</h3><pre>' + error.toString() + '</pre>';
                alert('иҜ·жұӮеӨұиҙҘпјҡ' + error);
            });
        }
    </script>
</body>
</html>
