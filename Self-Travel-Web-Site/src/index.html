  <div class="content">

    <div class="title">
      <h3>The LIFE of Mine</h3>

    <img src="img/bac 2.2.png" alt="background" class="back-2">

    <div class="info-wrap">
      <p>你好，我是一位热爱旅行与摄影的探索者。</p>
      <p>我相信，旅行不只是抵达一个地方，更是发现自我与世界的过程。在路上，我用镜头记录风景，用文字分享故事。</p>

  <!-- 登录表单 -->
  <div class="login-container" id="loginContainer">
    <div class="login-form">
      <span class="close-btn" id="closeLogin">&times;</span>
      <h2>用户登录</h2>
      <form id="loginForm">
        <div class="form-group">
          <label for="username">用户名</label>
          <input type="text" id="username" placeholder="请输入用户名" required>
        </div>
        <div class="form-group">
          <label for="password">密码</label>
          <input type="password" id="password" placeholder="请输入密码" required>
        </div>
        <button type="submit" class="submit-btn">登录</button>
      </form>
      <div class="extra-links">
        <a href="#">忘记密码?</a> | <a href="#">注册账号</a>
      </div>
    </div>
  </div>
  
  <script>
    // 原有的跳转函数
    function redirectToReviews() {
       window.location.href = "reviews.html";
     }
     
     // 登录相关脚本
     const showLoginBtn = document.getElementById('showLogin');
     const loginContainer = document.getElementById('loginContainer');
     const closeLoginBtn = document.getElementById('closeLogin');
     const loginForm = document.getElementById('loginForm');
 
     // 显示登录表单
     showLoginBtn.addEventListener('click', () => {
       loginContainer.style.display = 'flex';
     });
 
     // 关闭登录表单
     closeLoginBtn.addEventListener('click', () => {
       loginContainer.style.display = 'none';
     });
 
     // 点击模态框外部关闭
     loginContainer.addEventListener('click', (e) => {
       if (e.target === loginContainer) {
         loginContainer.style.display = 'none';
       }
     });
 
     // 表单提交处理
     loginForm.addEventListener('submit', (e) => {
       e.preventDefault();
       const username = document.getElementById('username').value;
       const password = document.getElementById('password').value;
       
       // 这里可以添加实际的登录验证逻辑（未添加）
       console.log('登录信息:', { username, password });
       
       // 模拟登录成功
       alert('登录成功!');
       loginContainer.style.display = 'none';
       
       // 登录后更新按钮状态
       showLoginBtn.innerHTML = '<i class="fas fa-user-check"></i> ' + username;
     });

let isDragging = false;
let offsetX = 0;
let offsetY = 0;

function dragAd(e) {
  const ad = document.getElementById("floatingAd");
  isDragging = true;
  offsetX = e.clientX - ad.getBoundingClientRect().left;
  offsetY = e.clientY - ad.getBoundingClientRect().top;

  document.onmousemove = function (e) {
    if (isDragging) {
      ad.style.left = (e.clientX - offsetX) + "px";
      ad.style.top = (e.clientY - offsetY) + "px";
      ad.style.right = "auto";
      ad.style.bottom = "auto";
    }
  };

  document.onmouseup = function () {
    isDragging = false;
    document.onmousemove = null;
    document.onmouseup = null;
  };
}

   </script>
